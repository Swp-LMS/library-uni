<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Holds — Librarian</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom Styles -->
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>
  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Librarian Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>
        <nav class="admin-nav">
          <a href="librarian-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a href="librarian-books.html"><i class="bi bi-journal-text"></i> Books</a>
          <a href="librarian-users.html"><i class="bi bi-people"></i> Users</a>
          <!-- NEW: Loans menu -->
          <a href="librarian-loans.html"><i class="bi bi-journal-plus"></i> Loans</a>
          <a href="librarian-holds.html"><i class="bi bi-bell"></i> Holds</a>
          <a href="librarian-overdue.html"><i class="bi bi-exclamation-octagon"></i> Overdue</a>
          <a href="librarian-blacklist.html"><i class="bi bi-person-x"></i> Blacklist</a>
        </nav>

        <!-- ✅ Sidebar Footer: Theme + Logout buttons cố định ở dưới -->
        <div class="admin-sidebar-footer">
          <!-- Theme Toggle Button -->
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
          <!-- Logout Button -->
          <button
            id="btnLogout"
            class="btn btn-logout-sidebar w-100 d-flex align-items-center gap-2 px-3 py-2"
          >
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="admin-content">
        <header class="bg-white border-bottom py-3 shadow-sm">
          <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
            <h1 class="h5 mb-0 fw-semibold">Manage Holds</h1>

            <div class="d-flex align-items-center gap-2 flex-wrap ms-auto">
              <!-- 🔍 Search -->
              <input
                id="q"
                class="form-control form-control-sm"
                placeholder="Search user / book"
                style="min-width: 240px"
              />

              <!-- Status filter -->
              <select id="status" class="form-select form-select-sm" style="width: auto">
                <option value="">All</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="cancelled">Cancelled</option>
                <option value="borrowed">Borrowed</option>
              </select>

              <!-- Refresh button -->
              <button
                id="btnRefresh"
                class="btn btn-primary btn-sm d-flex align-items-center gap-1"
              >
                <i class="bi bi-arrow-clockwise"></i> Refresh
              </button>
            </div>
          </div>
        </header>

        <!-- Table Section -->
        <section class="container my-4">
          <div class="card admin">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th style="width: 60px">ID</th>
                      <th>Book</th>
                      <th>User</th>
                      <th style="width: 140px">Created</th>
                      <th style="width: 110px">Status</th>
                      <th style="width: 300px" class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="6" class="text-muted small">Loading…</td>
                    </tr>
                  </tbody>
                </table>
                <div class="d-flex justify-content-between align-items-center mt-2 small">
                  <div id="count" class="text-muted">0 records</div>
                  <ul class="pagination pagination-sm mb-0" id="pager"></ul>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Toast Notifications -->
        <div id="toastArea" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
      </main>
    </div>

    <!-- JS Modules -->
    <script type="module">
      import { initLibrarianHolds } from './assets/js/librarian-holds.js';
      initLibrarianHolds();

      // Theme toggle
      const btn = document.getElementById('btnTheme');
      if (btn) {
        btn.addEventListener('click', () => {
          const cur = document.documentElement.getAttribute('data-bs-theme') || 'light';
          const next = cur === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-bs-theme', next);
          localStorage.setItem('theme', next);
        });
      }

      // Highlight current sidebar link
      (() => {
        const cur = location.pathname.split('/').pop();
        document.querySelectorAll('.admin-nav a').forEach((a) => {
          if (a.getAttribute('href')?.endsWith(cur)) a.classList.add('active');
          else a.classList.remove('active');
        });
      })();
    </script>

    <!-- Logout Modal -->
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title"><i class="bi bi-box-arrow-right me-2"></i>Confirm logout</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">You're about to sign out of the Librarian Panel.</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmLogoutBtn">
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // ✅ Theme Toggle với cập nhật icon/label
      function updateThemeUI(theme) {
        const icon = document.getElementById('themeIcon');
        const label = document.getElementById('themeLabel');
        if (icon && label) {
          if (theme === 'dark') {
            icon.className = 'bi bi-sun';
            label.textContent = 'Dark';
          } else {
            icon.className = 'bi bi-moon-stars';
            label.textContent = 'Light';
          }
        }
      }

      // Load theme đã lưu
      (function () {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', saved);
        updateThemeUI(saved);
      })();

      document.getElementById('btnTheme')?.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-bs-theme') || 'light';
        const next = cur === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', next);
        localStorage.setItem('theme', next);
        updateThemeUI(next);
      });

      // Logout modal logic
      const logoutModal = new bootstrap.Modal(document.getElementById('logoutModal'));
      document.getElementById('btnLogout')?.addEventListener('click', () => logoutModal.show());
      document.getElementById('confirmLogoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      });
    </script>
  </body>
</html>
