                  <option value="title_desc">Title Z→A</option>
                </select>

              <!-- Hàng 2: Add + Import -->

                <button

    <!-- toasts -->

    <!-- Logout Modal -->
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">

        <div class="modal-content">

              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">You're about to sign out of the Librarian Panel.</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmLogoutBtn">
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
          </div>
        </div>
      </div>

    <script type="module">
      import { initLibrarianBooks } from './assets/js/librarian-books.js';
      initLibrarianBooks();

      // ✅ Theme Toggle Handler với cập nhật icon/label
      function updateThemeUI(theme) {
        const icon = document.getElementById('themeIcon');
        const label = document.getElementById('themeLabel');
        if (icon && label) {
          if (theme === 'dark') {
            icon.className = 'bi bi-sun';
            label.textContent = 'Dark';
          } else {
            icon.className = 'bi bi-moon-stars';
            label.textContent = 'Light';
          }
        }
      }

      // Load theme đã lưu
      (function () {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', saved);
        updateThemeUI(saved);
      })();

      // Theme toggle button handler
      document.getElementById('btnTheme')?.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-bs-theme') || 'light';
        const next = cur === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', next);
        localStorage.setItem('theme', next);
        updateThemeUI(next);
      });

      // ✅ Active Sidebar: Tự động highlight menu item đang active
      (function () {
        const cur = location.pathname.split('/').pop();
        document.querySelectorAll('.admin-nav a').forEach((a) => {
          const href = a.getAttribute('href') || '';
          if (href.endsWith(cur)) {
            a.classList.add('active');
          } else {
            a.classList.remove('active');
          }
        });
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Logout handler with modal
      const logoutModal = new bootstrap.Modal(document.getElementById('logoutModal'));

      document.getElementById('btnLogout')?.addEventListener('click', () => {
        logoutModal.show();
      });

      document.getElementById('confirmLogoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      });
    </script>
