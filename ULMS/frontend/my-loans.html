<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Library — My Loans</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap + Icons + style chung -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Navbar render -->
    <div id="app-navbar"></div>

    <!-- HERO -->
    <header class="hero">
      <div class="container py-5">
        <h1 class="display-6 fw-bold text-white mb-2">My Loans</h1>
        <p class="text-white-50 mb-0">View and manage your borrowed books.</p>
      </div>
    </header>

    <main class="container my-5">
      <!-- TITLE + FILTER -->
      <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <h2 class="h5 mb-0">Current Loans</h2>

        <div class="d-flex gap-2">
          <input
            id="searchInput"
            class="form-control form-control-sm"
            placeholder="Search title..."
          />

          <select id="sortSelect" class="form-select form-select-sm">
            <option value="borrow-new">Borrowed: Newest</option>
            <option value="borrow-old">Borrowed: Oldest</option>
            <option value="title-asc">Title: A → Z</option>
            <option value="title-desc">Title: Z → A</option>
            <option value="due-near">Due: Nearest</option>
            <option value="due-far">Due: Farthest</option>
          </select>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr>
                  <th>Title</th>
                  <th style="width: 140px">Borrowed</th>
                  <th style="width: 140px">Due</th>
                  <th style="width: 110px">Status</th>
                </tr>
              </thead>
              <tbody id="loansTableBody">
                <tr>
                  <td colspan="4" class="text-muted small text-center">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="d-flex justify-content-between mt-2 small text-muted">
            <div id="countLoans"></div>
          </div>
        </div>
      </div>

      <!-- INFO -->
      <div class="alert alert-info mt-4">
        <i class="bi bi-info-circle fs-4 me-2"></i>
        <strong>Loan Information</strong>
        <ul class="mt-2 mb-0 small">
          <li>
            Loan period is configured by the library (often around 14 days) or by book category.
          </li>
          <li>Overdue items may incur fines.</li>
        </ul>
      </div>
    </main>

    <!-- Toast area (hiện tại không dùng cho actions, nhưng giữ lại nếu sau này cần) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>

    <!-- JS -->
    <script type="module">
      import { renderNavbar } from './assets/js/nav.js';
      import { initLoans } from './assets/js/my-loans.js';
      renderNavbar();
      initLoans();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
