<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Login — Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Theme + Auth style -->
    <link href="assets/css/style.css" rel="stylesheet" />

    <!-- Bootstrap Icons (cho FB/Twitter/GitHub) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body class="auth-body">
    <div id="app-navbar"></div>

    <!-- Nền sách + bong bóng -->
    <div class="auth-bg-books">
      <div class="book-orb orb-1"><i class="bi bi-book"></i></div>
      <div class="book-orb orb-2"><i class="bi bi-book-half"></i></div>
      <div class="book-orb orb-3"><i class="bi bi-journal-bookmark"></i></div>
      <div class="book-orb orb-4"><i class="bi bi-journal-richtext"></i></div>
      <div class="book-orb orb-5"><i class="bi bi-book"></i></div>
    </div>

    <main class="auth-main w-100 px-2 px-md-0">
      <div class="auth-card card">
        <div class="row g-0">
          <!-- LEFT: Login form -->
          <div class="col-12 col-md-6 auth-left p-4 p-md-5">
            <div class="auth-left-content">
              <h1 class="h4 mb-2 auth-title">Login</h1>
              <p class="mb-3 auth-subtitle">Welcome back! Please enter your details.</p>

              <div id="msg"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    id="email"
                    type="email"
                    class="form-control"
                    placeholder="you@example.com"
                    required
                    autocomplete="username"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label d-flex justify-content-between align-items-center">
                    <span>Password</span>
                    <a id="forgotLink" href="forgot-password.html" class="small"
                      >Forgot password?</a
                    >
                  </label>

                  <div class="input-group password-group">
                    <input
                      id="password"
                      type="password"
                      class="form-control"
                      placeholder="••••••••"
                      required
                      minlength="8"
                      autocomplete="current-password"
                    />
                    <button
                      class="btn btn-password-toggle"
                      type="button"
                      id="togglePwd"
                      aria-label="Toggle password visibility"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="d-grid mt-3">
                  <button class="btn btn-primary" type="submit">Log in</button>
                </div>

                <!-- Divider "or" -->
                <div class="divider-text">or sign in with</div>

                <!-- Social buttons -->
                <div class="d-flex justify-content-center gap-2 social-row">
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    title="Google"
                    id="googleBtn"
                  >
                    <img
                      src="https://www.svgrepo.com/show/355037/google.svg"
                      alt="Google"
                      width="18"
                    />
                  </button>
                  <button type="button" class="btn btn-outline-secondary" title="Facebook">
                    <i class="bi bi-facebook"></i>
                  </button>
                  <button type="button" class="btn btn-outline-secondary" title="Twitter">
                    <i class="bi bi-twitter"></i>
                  </button>
                  <button type="button" class="btn btn-outline-secondary" title="GitHub">
                    <i class="bi bi-github"></i>
                  </button>
                </div>
              </form>
            </div>
          </div>

          <!-- RIGHT: Panel xanh -->
          <div
            class="col-12 col-md-6 auth-right d-flex align-items-center justify-content-center p-4 p-md-5"
          >
            <div class="auth-right-inner text-center">
              <h2 class="h3 mb-3">Welcome Back!</h2>
              <p class="mb-4 small opacity-75">
                Don’t have an account yet?<br />
                Join our library and start exploring.
              </p>
              <a href="register.html" class="btn btn-light rounded-pill px-4" id="btnCreateAccount">
                Create an account
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import { renderNavbar } from './assets/js/nav.js';
      import { initLogin } from './assets/js/auth.js';

      renderNavbar();
      initLogin();

      // Forgot password + next
      const forgotLink = document.getElementById('forgotLink');
      const emailInput = document.getElementById('email');

      forgotLink?.addEventListener('click', (e) => {
        e.preventDefault();
        const baseHref = forgotLink.getAttribute('href') || 'forgot-password.html';
        const url = new URL(baseHref, location.href);

        const email = (emailInput?.value || '').trim();
        if (email) url.searchParams.set('email', email);

        const next = new URLSearchParams(location.search).get('next');
        if (next) url.searchParams.set('next', next);

        location.href = url.toString();
      });

      // Google Login
      document.getElementById('googleBtn')?.addEventListener('click', () => {
        const next = new URLSearchParams(location.search).get('next');
        const redirectUrl = next
          ? `http://localhost:3000/api/auth/google?next=${encodeURIComponent(next)}`
          : `http://localhost:3000/api/auth/google`;
        window.location.href = redirectUrl;
      });

      // 🔄 Hiệu ứng "cuốn sách" sang trang Register
      const btnCreate = document.getElementById('btnCreateAccount');
      const authCard = document.querySelector('.auth-card');

      btnCreate?.addEventListener('click', (e) => {
        e.preventDefault();
        authCard?.classList.add('anim-to-register');
        setTimeout(() => {
          location.href = 'register.html';
        }, 650); // khớp với CSS transition
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
