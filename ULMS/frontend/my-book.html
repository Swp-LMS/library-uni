<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Library — Browse Books</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons (để hiện chuông, moon, v.v. giống Book Detail) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- App CSS -->
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Navbar -->
    <div id="app-navbar"></div>

    <!-- Hero giống Membership / Reservations -->
    <header class="hero">
      <div class="container py-5">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <h1 class="display-6 fw-bold text-white mb-2">Browse Books</h1>
            <p class="text-white-50 mb-0">
              Explore all books currently available in the library.
            </p>
          </div>
          <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
            <span id="countBooks" class="badge bg-secondary"> 0 books </span>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="container my-4">
      <!-- Category chips -->
      <div class="chip-scroll mb-3" id="catChips">
        <!-- JS sẽ fill All / Fiction / Science... vào đây -->
      </div>

      <!-- Filters -->
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <input
            type="search"
            id="searchInput"
            class="form-control"
            placeholder="Search by title, author..."
          />
        </div>
        <div class="col-md-3">
          <select id="sortSelect" class="form-select">
            <option value="newest">Newest</option>
            <option value="title_asc">Title A → Z</option>
            <option value="title_desc">Title Z → A</option>
            <option value="rating_desc">Rating ↓</option>
            <option value="rating_asc">Rating ↑</option>
          </select>
        </div>
        <div class="col-md-3 text-md-end">
          <button id="btnRefresh" class="btn btn-outline-secondary w-100 w-md-auto">
            Refresh
          </button>
        </div>
      </div>

      <!-- Grid -->
      <div id="bookGrid" class="row g-3"></div>

      <!-- Pager -->
      <nav class="mt-4 d-flex justify-content-between align-items-center" id="pagerWrapper">
        <button class="btn btn-outline-secondary btn-sm" id="btnPrev">« Prev</button>
        <span id="pagerInfo" class="text-muted small">Page 1 / 1</span>
        <button class="btn btn-outline-secondary btn-sm" id="btnNext">Next »</button>
      </nav>

      <!-- Empty / status -->
      <div id="listStatus" class="text-center text-muted mt-4"></div>
    </main>

    <!-- Scripts -->
    <script type="module">
      import { renderNavbar } from './assets/js/nav.js';
      import { initBooks } from './assets/js/my-book.js';

      // bật theme + pill “Books” giống My Reservations / Book Detail
      renderNavbar('books');
      initBooks();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
