<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Reset Password — Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app-navbar"></div>

    <main
      class="container d-flex align-items-center justify-content-center"
      style="min-height: 70vh; max-width: 520px"
    >
      <div class="card w-100 shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3 text-center">Reset Password</h1>

          <div id="msg"></div>

          <form id="resetForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">OTP</label>
              <input
                id="otp"
                type="text"
                class="form-control"
                placeholder="6-digit code"
                maxlength="6"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">New password</label>
              <input
                id="newPassword"
                type="password"
                class="form-control"
                minlength="8"
                required
              />
              <div class="form-text small text-muted">
                At least 8 characters, including letters, numbers and symbols.
              </div>

              <!-- 🔐 Password strength bar (dùng bởi auth.js) -->
              <div class="progress mt-2" style="height: 6px">
                <div
                  id="pwdStrengthBar"
                  class="progress-bar"
                  role="progressbar"
                  style="width: 0%"
                  aria-valuemin="0"
                  aria-valuemax="4"
                ></div>
              </div>
              <div id="pwdStrengthText" class="small mt-1 text-muted"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm new password</label>
              <input
                id="confirmPassword"
                type="password"
                class="form-control"
                minlength="8"
                required
              />
            </div>

            <div class="d-grid">
              <button class="btn btn-primary" type="submit">Reset password</button>
            </div>
          </form>

          <div class="text-center small mt-3">
            Quay lại <a href="login.html">đăng nhập</a>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import { renderNavbar } from './assets/js/nav.js';
      import { initResetPassword } from './assets/js/auth.js';
      renderNavbar();
      initResetPassword();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
