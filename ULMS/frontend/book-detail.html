<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Library — Book Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- App CSS (có .hero, navbar theme, v.v.) -->
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <div id="app-navbar"></div>

    <!-- Hero giống My Reservations / Browse Books -->
    <header class="hero">
      <div class="container py-5">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <h1 class="display-6 fw-bold text-white mb-2">Book Detail</h1>
            <p class="text-white-50 mb-0">
              View information, availability and reviews for this book.
            </p>
          </div>
        </div>
      </div>
    </header>

    <!-- Nội dung chi tiết sách do JS render -->
    <main class="container my-5">
      <div id="content"></div>
    </main>

    <!-- JS -->
    <script type="module">
      import { renderNavbar } from './assets/js/nav.js';
      import { initBook } from './assets/js/book-detail.js';

      // Cho navbar render & (nếu nav.js có hỗ trợ) set tab Books active
      renderNavbar('books');   // nếu nav.js không dùng param thì cũng không sao

      // Load chi tiết sách
      initBook();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
