<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Manage Books — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- App CSS -->
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Admin Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>

        <nav class="admin-nav">
          <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-journal-text"></i> Books
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="admin-books.html">All Books</a>
              <a href="admin-book-add.html">Add New Book</a>
            </div>
          </div>

          <a href="admin-authors.html"><i class="bi bi-person-vcard"></i> Authors</a>
          <a href="admin-categories.html"><i class="bi bi-tags"></i> Categories</a>
          <a href="admin-publishers.html"><i class="bi bi-building"></i> Published</a>
          <a href="admin-users.html"><i class="bi bi-people"></i> Users</a>

          <!-- Loans / Holds / Overdue -->
          <a href="admin-loans.html"><i class="bi bi-receipt"></i> Loans</a>
          <a href="admin-holds.html"><i class="bi bi-bell"></i> Holds</a>
          <a href="admin-overdue.html"><i class="bi bi-exclamation-octagon"></i> Overdue</a>
          <a href="admin-blacklist.html"><i class="bi bi-person-x"></i> Blacklist</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-gear"></i> Settings
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="settings.html">General Settings</a>
              <a href="admin-memberships.html">Membership Plans</a>
              <!-- <a href="admin-email-templates.html">Email Templates</a> -->
            </div>
          </div>
        </nav>

        <!-- Sidebar footer: Theme + Logout -->
        <div class="admin-sidebar-footer">
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
          <!-- Logout sẽ được inject bởi admin-common.js nếu chưa có -->
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="admin-content">
        <!-- Header -->
        <header class="bg-white border-bottom py-3">
          <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
            <h1 class="h5 mb-0">Manage Books</h1>

            <div class="d-flex align-items-center gap-2 flex-wrap ms-auto">
              <!-- Search -->
              <input
                id="q"
                class="form-control form-control-sm"
                placeholder="Search title / author / category..."
                style="min-width: 260px"
              />

              <!-- Sort -->
              <select id="sort" class="form-select form-select-sm" style="width: auto">
                <option value="newest">Sort by ID</option>
                <option value="title">Title A–Z</option>
                <option value="author">Author A–Z</option>
                <option value="category">Category A–Z</option>
              </select>

              <!-- ✅ Chỉ còn nút Search, đã bỏ Add Book -->
              <button id="btnSearch" class="btn btn-primary btn-sm">
                <i class="bi bi-search"></i> Search
              </button>
            </div>
          </div>
        </header>

        <!-- CONTENT -->
        <section class="container my-4">
          <div class="card admin">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th style="width: 120px">Image</th>
                      <th style="width: 60px">ID</th>
                      <th>Title</th>
                      <th>Author</th>
                      <th>Category</th>
                      <th>Publisher</th>
                      <!-- 👇 THÊM CỘT PRICE -->
                      <th style="width: 80px" class="text-center">Price</th>
                      <th style="width: 60px" class="text-start">Total</th>
                      <th style="width: 140px" class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <!-- nhớ đổi colspan = 9 -->
                    <tr>
                      <td colspan="9" class="text-muted small">Loading…</td>
                    </tr>
                  </tbody>

                  <tbody id="tableBody">
                    <tr>
                      <td colspan="8" class="text-muted small">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="d-flex align-items-center justify-content-between mt-2">
                <div id="count" class="text-muted small"></div>
                <ul class="pagination pagination-sm mb-0" id="pager"></ul>
              </div>
            </div>
          </div>
        </section>

        <!-- Toasts -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>
      </main>
    </div>

    <!-- Modal Add/Edit (vẫn giữ để dùng cho Edit nếu cần) -->
    <div
      class="modal fade"
      id="bookModal"
      tabindex="-1"
      aria-hidden="true"
      data-bs-backdrop="static"
    >
      <div class="modal-dialog">
        <form id="bookForm" class="modal-content" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add Book</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="bookId" />
            <div class="mb-2">
              <label class="form-label">Title</label>
              <input id="title" class="form-control" autocomplete="off" />
            </div>
            <div class="mb-2">
              <label class="form-label">Author</label>
              <select id="authorId" class="form-select"></select>
            </div>
            <div class="mb-2">
              <label class="form-label">Category</label>
              <select id="categoryId" class="form-select"></select>
            </div>
            <div class="mb-2">
              <label class="form-label">Publisher</label>
              <select id="publisherId" class="form-select"></select>
            </div>
            <div class="row">
              <div class="col-6 mb-2">
                <label class="form-label">Total Copies</label>
                <input id="totalCopies" class="form-control" type="number" min="0" />
              </div>
              <div class="col-6 mb-2">
                <label class="form-label">Year</label>
                <input id="publishYear" class="form-control" type="number" min="0" />
              </div>
            </div>
            <div id="statusGroup" class="mb-2 d-none">
              <label class="form-label">Status</label>
              <select id="status" class="form-select">
                <option value="available">Available</option>
                <option value="unavailable">Unavailable</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label">Description</label>
              <textarea id="description" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button id="btnSave" class="btn btn-primary" type="submit">Save</button>
          </div>
        </form>
      </div>
      <!-- uploader cho ảnh bìa -->
      <input type="file" id="uploader" accept="image/*" class="d-none" />
    </div>

    <!-- Admin Common (Theme + Logout) -->
    <script type="module" src="assets/js/admin-common.js"></script>

    <!-- Init Books page -->
    <script type="module">
      import { initBooksAdmin } from './assets/js/admin-books.js';
      initBooksAdmin();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
