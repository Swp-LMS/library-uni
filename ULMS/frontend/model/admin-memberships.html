<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Membership Plans — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- App CSS -->
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Admin Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>

        <nav class="admin-nav">
          <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>

          <div class="nav-group">
            <a href="#" class="nav-parent"
              ><i class="bi bi-journal-text"></i> Books <i class="bi bi-chevron-down ms-auto"></i
            ></a>
            <div class="nav-sub">
              <a href="admin-books.html">All Books</a>
              <a href="admin-book-add.html">Add New Book</a>
            </div>
          </div>

          <a href="admin-authors.html"><i class="bi bi-person-vcard"></i> Authors</a>
          <a href="admin-categories.html"><i class="bi bi-tags"></i> Categories</a>
          <a href="admin-publishers.html"><i class="bi bi-building"></i> Published</a>
          <a href="admin-users.html"><i class="bi bi-people"></i> Users</a>
          <a href="admin-loans.html"><i class="bi bi-receipt"></i> Loans</a>
          <a href="admin-holds.html"><i class="bi bi-bell"></i> Holds</a>
          <a href="admin-overdue.html"><i class="bi bi-exclamation-octagon"></i> Overdue</a>
          <a href="admin-blacklist.html"><i class="bi bi-person-x"></i> Blacklist</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-gear"></i> Settings
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub show">
              <a href="settings.html">General Settings</a>
              <a href="admin-memberships.html">Membership Plans</a>
            </div>
          </div>
        </nav>

        <!-- ✅ Sidebar Footer: Theme + Logout buttons cố định ở dưới -->
        <div class="admin-sidebar-footer">
          <!-- Theme Toggle Button -->
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
          <!-- Logout Button (sẽ được admin-common.js inject nếu chưa có) -->
        </div>
      </aside>

      <!-- Main content -->
      <main class="admin-content">
        <header class="bg-white border-bottom py-3 shadow-sm">
          <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
            <h1 class="h5 mb-0 fw-semibold">Membership Plans</h1>

            <button id="btnAddPlan" class="btn btn-primary btn-sm">
              <i class="bi bi-plus-lg"></i> Add New Plan
            </button>
          </div>
        </header>

        <section class="container my-4">
          <div class="card admin shadow-sm">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th style="width: 60px">ID</th>
                      <th>Name</th>
                      <th>Price</th>
                      <th>Duration Days</th>
                      <th>Max Books</th>
                      <th style="width: 110px" class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="planTableBody">
                    <tr>
                      <td colspan="6" class="text-muted small text-center">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/admin-common.js"></script>
    <script type="module" src="assets/js/admin-memberships.js"></script>
  </body>
</html>
