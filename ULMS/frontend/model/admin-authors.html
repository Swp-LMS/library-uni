<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Manage Authors — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Admin Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>
        <nav class="admin-nav">
          <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-journal-text"></i> Books
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="admin-books.html">All Books</a>
              <a href="admin-book-add.html">Add New Book</a>
            </div>
          </div>

          <a href="admin-authors.html"><i class="bi bi-person-vcard"></i> Authors</a>
          <a href="admin-categories.html"><i class="bi bi-tags"></i> Categories</a>
          <a href="admin-publishers.html"><i class="bi bi-building"></i> Published</a>
          <a href="admin-users.html"><i class="bi bi-people"></i> Users</a>

          <!-- ⭐ ADD THIS (Loans Menu) -->
          <a href="admin-loans.html"><i class="bi bi-receipt"></i> Loans</a>

          <a href="admin-holds.html"><i class="bi bi-bell"></i> Holds</a>
          <a href="admin-overdue.html"><i class="bi bi-exclamation-octagon"></i> Overdue</a>
          <a href="admin-blacklist.html"><i class="bi bi-person-x"></i> Blacklist</a>
          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-gear"></i> Settings
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="settings.html">General Settings</a>
              <a href="admin-memberships.html">Membership Plans</a>
              <!-- Sau này muốn thêm nữa thì thêm ở đây -->
              <!-- <a href="admin-email-templates.html">Email Templates</a> -->
            </div>
          </div>
        </nav>

        <!-- ✅ Sidebar Footer: Theme + Logout buttons cố định ở dưới -->
        <div class="admin-sidebar-footer">
          <!-- Theme Toggle Button -->
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
          <!-- Logout Button (sẽ được admin-common.js inject nếu chưa có) -->
        </div>
      </aside>

      <!-- Content -->
      <main class="admin-content">
        <header class="bg-white border-bottom py-3">
          <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
            <h1 class="h5 mb-0">Manage Authors</h1>
            <div class="d-flex align-items-center gap-2 flex-wrap ms-auto">
              <input
                id="q"
                class="form-control form-control-sm"
                placeholder="Search by name"
                style="min-width: 250px"
              />
              <select id="sort" class="form-select form-select-sm" style="width: auto">
                <option value="id" selected>Sort by ID</option>
                <option value="name">Sort by Name (A–Z)</option>
                <option value="book">Sort by Book Title (A–Z)</option>
              </select>
              <div class="d-flex gap-2">
                <button id="btnSearch" class="btn btn-primary btn-sm">
                  <i class="bi bi-search"></i> Search
                </button>
                <button id="btnAdd" class="btn btn-success btn-sm">
                  <i class="bi bi-plus-circle"></i> Add Authors
                </button>
              </div>
            </div>
          </div>
        </header>

        <section class="container my-4">
          <div class="card admin">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th style="width: 80px">ID</th>
                      <th>Name</th>
                      <th>Books</th>
                      <th>Birth Year</th>
                      <th style="width: 150px" ; class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="6" class="text-muted small">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="d-flex align-items-center justify-content-between mt-2">
                <div id="count" class="text-muted small"></div>
                <ul class="pagination pagination-sm mb-0" id="pager"></ul>
              </div>
            </div>
          </div>
        </section>

        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>
      </main>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal fade" id="authorModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <form id="authorForm" class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add Author</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="authorId" />
            <div class="mb-2">
              <label class="form-label">Name</label>
              <input id="name" class="form-control" required />
            </div>
            <div class="mb-2">
              <label class="form-label">Birth Year</label>
              <input id="birthYear" type="number" class="form-control" />
            </div>
          </div>
          <div class="modal-footer">
            <button id="btnSave" class="btn btn-primary" type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 🆕 Modal Detail -->
    <div class="modal fade" id="authorDetailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Author Detail</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="authorDetailContent">
            <div class="text-center text-muted small">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin common -->
    <script type="module" src="assets/js/admin-common.js"></script>

    <!-- ✅ Gọi hàm initAuthorsAdmin() -->
    <script type="module">
      import { initAuthorsAdmin } from './assets/js/admin-authors.js';
      initAuthorsAdmin(); // 👈 gọi hàm khởi tạo để load danh sách tác giả
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
