<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Loan — Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Admin Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>

        <nav class="admin-nav">
          <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a href="admin-loans.html"><i class="bi bi-table"></i> Loans</a>
        </nav>

        <!-- ✅ Sidebar Footer: Theme + Logout buttons cố định ở dưới -->
        <div class="admin-sidebar-footer">
          <!-- Theme Toggle Button -->
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
          <!-- Logout Button (sẽ được admin-common.js inject nếu chưa có) -->
        </div>
      </aside>

      <main class="admin-content">
        <!-- BLUE HEADER -->
        <div class="p-3" style="background: #0c4a6e; color: white; border-radius: 8px">
          <a href="admin-loans.html" class="text-white small">
            <i class="bi bi-arrow-left"></i> Back to Loans
          </a>
          <h3 class="mt-2 mb-0">Edit Loan</h3>
        </div>

        <!-- FORM CARD -->
        <section class="container my-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <div id="errBox" class="alert alert-danger d-none"></div>

              <div class="mb-3">
                <label class="form-label fw-semibold">User</label>
                <input id="userName" readonly class="form-control bg-light" />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Book</label>
                <input id="bookName" readonly class="form-control bg-light" />
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Loan Date</label>
                  <input id="loanDate" type="date" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Due Date</label>
                  <input id="dueDate" type="date" class="form-control" />
                </div>
              </div>

              <div class="mt-3">
                <label class="form-label fw-semibold">Status</label>
                <select id="status" class="form-select">
                  <option value="pending">Pending</option>
                  <option value="borrowed">Borrowed</option>
                  <option value="returned">Returned</option>
                  <option value="late">Late</option>
                </select>
              </div>

              <button id="btnSave" class="btn btn-primary w-100 mt-4">
                <i class="bi bi-check-circle"></i> Save Changes
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="assets/js/admin-common.js"></script>
    <script type="module" src="assets/js/admin-loans-edit.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
