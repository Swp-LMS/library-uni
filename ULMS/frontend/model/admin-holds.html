<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Manage Holds — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Common style + admin -->
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Admin Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>

        <nav class="admin-nav">
          <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-journal-text"></i> Books
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="admin-books.html">All Books</a>
              <a href="admin-book-add.html">Add New Book</a>
            </div>
          </div>

          <a href="admin-authors.html"><i class="bi bi-person-vcard"></i> Authors</a>
          <a href="admin-categories.html"><i class="bi bi-tags"></i> Categories</a>
          <a href="admin-publishers.html"><i class="bi bi-building"></i> Published</a>
          <a href="admin-users.html"><i class="bi bi-people"></i> Users</a>

          <!-- Loans / Holds / Overdue -->
          <a href="admin-loans.html"><i class="bi bi-receipt"></i> Loans</a>
          <a href="admin-holds.html"><i class="bi bi-bell"></i> Holds</a>
          <a href="admin-overdue.html"><i class="bi bi-exclamation-octagon"></i> Overdue</a>
          <a href="admin-blacklist.html"><i class="bi bi-person-x"></i> Blacklist</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-gear"></i> Settings
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="settings.html">General Settings</a>
              <a href="admin-memberships.html">Membership Plans</a>
              <!-- <a href="admin-email-templates.html">Email Templates</a> -->
            </div>
          </div>
        </nav>

        <!-- Sidebar Footer: Theme + (Logout do admin-common.js inject) -->
        <div class="admin-sidebar-footer">
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
        </div>
      </aside>

      <!-- Content -->
      <main class="admin-content">
        <!-- Header giống authors / books -->
        <header class="bg-white border-bottom">
          <div class="container py-3 d-flex align-items-center flex-wrap gap-2">
            <h1 class="h5 mb-0">Manage Holds</h1>

            <div class="ms-auto d-flex align-items-center gap-2 flex-wrap">
              <!-- Search -->
              <input
                id="q"
                type="text"
                class="form-control form-control-sm"
                placeholder="Search by user / book / note…"
                style="min-width: 260px"
              />

              <!-- Filter status -->
              <select id="status" class="form-select form-select-sm" style="width: auto">
                <option value="">All status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="cancelled">Cancelled</option>
                <option value="expired">Expired</option>
                <option value="completed">Completed</option>
              </select>

              <!-- Sort by status -->
              <select id="sort" class="form-select form-select-sm" style="width: auto">
                <option value="status-asc">Status ↑ (pending → completed)</option>
                <option value="status-desc">Status ↓ (completed → pending)</option>
              </select>

              <!-- Refresh -->
              <button
                id="btnRefresh"
                class="btn btn-primary btn-sm d-flex align-items-center gap-1"
                type="button"
              >
                <i class="bi bi-arrow-clockwise"></i>
                Refresh
              </button>
            </div>
          </div>
        </header>

        <!-- Table -->
        <section class="container my-4">
          <div class="card admin">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th style="width: 60px">ID</th>
                      <th>Book</th>
                      <th>User</th>
                      <th style="width: 160px">Created</th>
                      <th style="width: 120px">Status</th>
                      <th style="width: 200px">Note</th>
                      <th style="width: 110px" class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="7" class="text-muted small text-center">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="d-flex align-items-center justify-content-between mt-2">
                <div id="count" class="text-muted small"></div>
                <ul class="pagination pagination-sm mb-0" id="pager"></ul>
              </div>
            </div>
          </div>
        </section>

        <!-- Toasts -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>
      </main>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal fade" id="holdModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <form id="holdForm" class="modal-content">
          <div class="modal-body">
            <input type="hidden" id="holdId" />

            <div class="mb-2">
              <label class="form-label">Book ID</label>
              <input id="bookId" class="form-control" required />
            </div>

            <div class="mb-2">
              <label class="form-label">User ID</label>
              <input id="userId" class="form-control" required />
            </div>

            <div class="mb-2">
              <label class="form-label">Note</label>
              <textarea id="note" class="form-control" rows="2"></textarea>
            </div>

            <div class="mb-2">
              <label class="form-label">Status</label>
              <select id="statusField" class="form-select">
                <option value="pending">Pending</option>
                <option value="ready">Ready</option>
                <option value="fulfilled">Fulfilled</option>
                <option value="expired">Expired</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>

          <div class="modal-footer">
            <button id="btnSave" class="btn btn-primary" type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Admin common -->
    <script type="module" src="assets/js/admin-common.js"></script>

    <!-- Init Holds page -->
    <script type="module">
      import { initHoldsAdmin } from './assets/js/admin-holds.js';
      initHoldsAdmin();
    </script>

    <!-- Bootstrap bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
