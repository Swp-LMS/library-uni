<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Add Book — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <main class="container my-4">
      <div class="card shadow-sm" style="max-width: 1080px; margin: 0 auto">
        <div class="card-header bg-primary text-white fw-semibold">
          <i class="bi bi-plus-circle me-1"></i> Add New Book
        </div>

        <div class="card-body">
          <form id="addBookForm" class="row g-3">
            <!-- Hàng 1: Title / Published / Total -->
            <div class="col-12 col-lg-6">
              <label class="form-label">Title</label>
              <input id="title" type="text" class="form-control" required />
            </div>

            <div class="col-6 col-lg-3">
              <label class="form-label">Published Year</label>
              <input id="publishedYear" type="number" min="0" class="form-control" />
            </div>

            <div class="col-6 col-lg-3">
              <label class="form-label">Total Copies</label>
              <input id="totalCopies" type="number" min="1" value="1" class="form-control" />
            </div>

            <!-- Hàng 2: Price / Author / Category / Publisher -->
            <div class="col-6 col-lg-3">
              <label class="form-label">Price (VND)</label>
              <input id="price" type="number" min="0" class="form-control" />
            </div>

            <div class="col-6 col-lg-3">
              <label class="form-label">Author</label>
              <select id="authorId" class="form-select">
                <option value="">-- Select --</option>
              </select>
            </div>

            <div class="col-6 col-lg-3">
              <label class="form-label">Category</label>
              <select id="categoryId" class="form-select">
                <option value="">-- Select --</option>
              </select>
            </div>

            <div class="col-6 col-lg-3">
              <label class="form-label">Publisher</label>
              <select id="publisherId" class="form-select">
                <option value="">-- Select --</option>
              </select>
            </div>

            <!-- Description -->
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea id="description" rows="3" class="form-control"></textarea>
            </div>

            <!-- Book cover -->
            <div class="col-12">
              <label class="form-label d-block mb-1">Book Cover</label>
              <div class="row g-3 align-items-center">
                <div class="col-md-4">
                  <div
                    id="preview"
                    class="upload-preview d-flex align-items-center justify-content-center"
                    style="height: 140px"
                  >
                    <i class="bi bi-cloud-arrow-up fs-3 text-secondary"></i>
                  </div>
                  <!-- giữ nguyên id cho JS -->
                  <input type="file" id="uploader" accept="image/*" class="d-none" />
                </div>

                <div class="col-md-8">
                  <p class="text-muted small mb-1">
                    • Click vào khung bên trái để chọn ảnh bìa sách.<br />
                    • Hỗ trợ JPG, PNG, WEBP. Kích thước gợi ý ~ 600×900px.
                  </p>
                </div>
              </div>
            </div>

            <!-- Buttons -->
            <div class="col-12 text-end mt-3">
              <a href="admin-books.html" class="btn btn-outline-secondary px-4 me-2">
                <i class="bi bi-x-circle"></i> Thoát
              </a>
              <button class="btn btn-success px-4" type="submit">
                <i class="bi bi-check2-circle"></i> Save Book
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { initBookCreatePage } from './assets/js/admin-books.js';
      initBookCreatePage();
    </script>
  </body>
</html>
