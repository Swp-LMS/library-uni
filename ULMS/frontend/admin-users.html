<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Manage Users — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- App CSS -->
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <i class="bi bi-shield-lock"></i> Admin Panel
          <span class="badge badge-accent ms-2">Library</span>
        </div>

        <nav class="admin-nav">
          <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>

          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-journal-text"></i> Books
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="admin-books.html">All Books</a>
              <a href="admin-book-add.html">Add New Book</a>
            </div>
          </div>

          <a href="admin-authors.html"><i class="bi bi-person-vcard"></i> Authors</a>
          <a href="admin-categories.html"><i class="bi bi-tags"></i> Categories</a>
          <a href="admin-publishers.html"><i class="bi bi-building"></i> Published</a>
          <a href="admin-users.html"><i class="bi bi-people"></i> Users</a>

          <!-- ⭐ ADD THIS (Loans Menu) -->
          <a href="admin-loans.html"><i class="bi bi-receipt"></i> Loans</a>

          <a href="admin-holds.html"><i class="bi bi-bell"></i> Holds</a>
          <a href="admin-overdue.html"><i class="bi bi-exclamation-octagon"></i> Overdue</a>
          <a href="admin-blacklist.html"><i class="bi bi-person-x"></i> Blacklist</a>
          <div class="nav-group">
            <a href="#" class="nav-parent">
              <i class="bi bi-gear"></i> Settings
              <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="nav-sub">
              <a href="settings.html">General Settings</a>
              <a href="admin-memberships.html">Membership Plans</a>
              <!-- Sau này muốn thêm nữa thì thêm ở đây -->
              <!-- <a href="admin-email-templates.html">Email Templates</a> -->
            </div>
          </div>
        </nav>

        <!-- ✅ Sidebar Footer: Theme + Logout buttons cố định ở dưới -->
        <div class="admin-sidebar-footer">
          <!-- Theme Toggle Button -->
          <button
            id="btnTheme"
            class="btn btn-theme-sidebar w-100 d-flex align-items-center justify-content-between px-3 py-2 mb-3"
          >
            <i id="themeIcon" class="bi bi-moon-stars"></i>
            <span id="themeLabel" class="ms-auto">Light</span>
          </button>
          <!-- Logout Button (sẽ được admin-common.js inject nếu chưa có) -->
        </div>
      </aside>

      <!-- Main Content -->
      <main class="admin-content">
        <header class="bg-white border-bottom py-3 shadow-sm">
          <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
            <h1 class="h5 mb-0 fw-semibold">Manage Users</h1>

            <div class="d-flex align-items-center gap-2 flex-wrap ms-auto">
              <input
                id="q"
                class="form-control form-control-sm"
                placeholder="Search name/email/phone..."
                style="min-width: 250px"
              />
              <select id="sort" class="form-select form-select-sm" style="width: auto">
                <option value="id">Sort by ID</option>
                <option value="name">Sort by Name</option>
                <option value="email">Sort by Email</option>
              </select>
              <button id="btnSearch" class="btn btn-primary btn-sm">
                <i class="bi bi-search"></i> Search
              </button>
            </div>
          </div>
        </header>

        <section class="container my-4">
          <div class="card admin shadow-sm">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                  <thead>
                    <tr>
                      <th style="width: 60px">ID</th>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Phone</th>
                      <th>Address</th>
                      <th>Role</th>
                      <th>Created / Updated</th>
                      <th style="width: 110px" class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="8" class="text-muted small text-center">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="d-flex align-items-center justify-content-between mt-3">
                <div id="count" class="text-muted small">3 records</div>
                <nav>
                  <ul class="pagination pagination-sm mb-0" id="pager">
                    <li class="page-item disabled"><a class="page-link">&laquo;</a></li>
                    <li class="page-item active"><a class="page-link">1</a></li>
                    <li class="page-item disabled"><a class="page-link">&raquo;</a></li>
                  </ul>
                </nav>
              </div>
            </div>
          </div>
        </section>

        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>
      </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="assets/js/admin-common.js"></script>
    <script type="module">
      import { initUsersAdmin } from './assets/js/admin-users.js';
      initUsersAdmin();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
