<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Signing you in…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="d-flex align-items-center justify-content-center" style="min-height: 70vh">
    <div class="text-center">
      <div class="spinner-border" role="status" aria-hidden="true"></div>
      <p class="mt-3 mb-0">Signing you in with Google…</p>
      <div id="msg" class="text-danger small mt-2"></div>
    </div>

    <script type="module">
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const next = params.get('next') || '/';

      async function go() {
        if (!token) {
          document.getElementById('msg').textContent = 'Missing token from server.';
          return;
        }
        localStorage.setItem('token', token);

        try {
          const res = await fetch('http://localhost:3000/api/auth/profile', {
            headers: { Authorization: `Bearer ${token}` },
          });
          const json = await res.json();
          if (json?.success) {
            localStorage.setItem('user', JSON.stringify(json.data));
          }
        } catch (_) {}

        location.replace(next);
      }

      go();
    </script>
  </body>
</html>
