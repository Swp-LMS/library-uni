<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Forgot Password — Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app-navbar"></div>

    <main
      class="container d-flex align-items-center justify-content-center"
      style="min-height: 70vh; max-width: 520px"
    >
      <div class="card w-100 shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3 text-center">Forgot Password</h1>

          <div id="msg"></div>

          <form id="forgotForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="d-grid">
              <button class="btn btn-primary" type="submit">Send OTP</button>
            </div>
          </form>

          <hr class="my-4" />

          <div class="text-center small">
            Đã có mã OTP? <a id="toReset" href="reset-password.html">Đi đến đặt lại mật khẩu</a>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import { renderNavbar } from './assets/js/nav.js';
      import { initForgotPassword } from './assets/js/auth.js';
      renderNavbar();
      initForgotPassword();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
