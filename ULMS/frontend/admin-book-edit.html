<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Edit Book</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- MAIN CONTENT -->
    <main>
      <div class="container py-4">
        <h3 class="mb-4">Edit Book</h3>

        <form id="editBookForm" class="card p-4 shadow-sm bg-white">
          <div class="mb-3">
            <label class="form-label" for="title">Title</label>
            <input type="text" id="title" class="form-control" required />
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label" for="publishedYear">Published Year</label>
              <input type="number" id="publishedYear" class="form-control" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" for="totalCopies">Total Copies</label>
              <input type="number" id="totalCopies" class="form-control" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" for="price">Price (VND)</label>
              <input type="number" id="price" min="0" class="form-control" />
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label" for="status">Status</label>
              <select id="status" class="form-select">
                <option value="available">Available</option>
                <option value="unavailable">Unavailable</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" for="authorId">Author</label>
              <select id="authorId" class="form-select"></select>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" for="categoryId">Category</label>
              <select id="categoryId" class="form-select"></select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label" for="publisherId">Publisher</label>
              <select id="publisherId" class="form-select"></select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" class="form-control" rows="4"></textarea>
          </div>

          <!-- 🖼️ Image preview -->
          <div class="mb-3">
            <label class="form-label">Book Image</label>
            <div
              id="preview"
              class="border p-3 text-center text-muted"
              style="cursor: pointer; min-height: 150px"
            >
              Click to select image
            </div>
            <input type="file" id="uploader" accept="image/*" hidden />
          </div>

          <div class="d-flex justify-content-end gap-2">
            <a href="admin-books.html" class="btn btn-outline-secondary px-4">
              <i class="bi bi-x-circle"></i> Thoát
            </a>
            <button type="submit" class="btn btn-success px-4">
              <i class="bi bi-check2-circle"></i> Save Changes
            </button>
          </div>
        </form>
      </div>
    </main>

    <!-- TOAST AREA -->
    <div id="toastArea" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Bootstrap JS (phải trước module dùng bootstrap.Toast) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Page scripts -->
    <script type="module" src="./assets/js/admin-book-edit.js"></script>
    <script type="module" src="./assets/js/admin-dashboard.js"></script>
  </body>
</html>
